name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # The security-txt audit verifies the PGP signature; the public key ships
      # in the repo's WKD directory, so the runner can import it from there.
      - run: gpg --import public/.well-known/openpgpkey/hu/*

      # The same registry-driven gate that runs locally before a push. --no-sync
      # because CI has no vault; src/content is the committed snapshot.
      - run: npm run publish:check -- --no-sync
        env:
          ASTRO_TELEMETRY_DISABLED: '1'

      - run: npm sbom --sbom-format=cyclonedx > sbom.cdx.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.cdx.json
          if-no-files-found: error
