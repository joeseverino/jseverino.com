name: link check

on:
  pull_request:
    branches: [main]
    paths:
      - 'README.md'
      - 'SECURITY.md'
      - 'docs/**/*.md'
      - 'src/content/**/*.md'
  schedule:
    - cron: '37 11 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check repository documentation links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          output: lychee/repository-documentation.md
          args: >-
            --no-progress
            --verbose
            --accept 200,204,206,301,302,303,307,308,429,999
            README.md
            SECURITY.md
            docs/**/*.md
          fail: true

      - name: Check public content links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          output: lychee/public-content.md
          args: >-
            --no-progress
            --verbose
            --base-url https://jseverino.com
            --accept 200,204,206,301,302,303,307,308,429,999
            src/content/**/*.md
          fail: true

      - name: Upload link check reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: link-check-reports
          path: lychee
          if-no-files-found: ignore
